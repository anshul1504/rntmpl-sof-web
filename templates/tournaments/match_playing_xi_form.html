{% extends "accounts/base.html" %}
{% block title %}Submit Playing XI{% endblock %}
{% block content %}
<h2 class="fw-bold">Submit Playing XI</h2><p class="text-secondary">{{ match.home_team.team.name }} vs {{ match.away_team.team.name }}</p>
<div class="card border-0 shadow-sm"><div class="card-body p-4">
<form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary">Save Playing XI</button>
<a href="{% url 'tournaments:match-setup' match.pk %}" class="btn btn-outline-secondary">Cancel</a></form>
</div></div>
{% endblock %}
