{% extends "accounts/base.html" %}
{% block title %}Tournament Rules{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div><h2 class="fw-bold mb-1">Tournament Rules</h2><p class="text-secondary mb-0">{{ tournament.name }}</p></div>
  <a class="btn btn-outline-secondary" href="{% url 'tournaments:tournament-detail' tournament.pk %}">Back</a>
</div>
<div class="card shadow-sm border-0"><div class="card-body p-4">
<form method="post">{% csrf_token %}
  <div class="row g-3">
  {% for field in form %}
    <div class="col-md-6">
      <label class="form-label fw-semibold">{{ field.label }}</label>
      {{ field }}{% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
    </div>
  {% endfor %}
  </div>
  <button class="btn btn-primary mt-4" type="submit">Save Rules</button>
</form>
</div></div>
{% endblock %}
