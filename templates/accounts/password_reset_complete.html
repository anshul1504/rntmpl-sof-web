{% extends "accounts/auth_base.html" %}
{% load static %}

{% block title %}Password Reset Complete - RNT MPL{% endblock %}

{% block auth_content %}
<div class="text-center p-2">
    <div class="mb-3" style="color: var(--gold-primary);"><i class="bi bi-check-circle" style="font-size: 3.5rem;"></i></div>
    <h4 class="text-dark fw-medium mb-2">Password reset complete</h4>
    <p class="text-muted small mb-4">Your password has been reset successfully.</p>
    
    <a href="{% url 'accounts:login' %}" class="btn btn-primary-custom w-100 btn-lg">Sign in with new password</a>
</div>
{% endblock %}
