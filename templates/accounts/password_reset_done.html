{% extends "accounts/auth_base.html" %}
{% load static %}

{% block title %}Email Sent - RNT MPL{% endblock %}

{% block auth_content %}
<div class="text-center p-2">
    <div class="mb-3" style="color: var(--gold-primary);"><i class="bi bi-envelope-check" style="font-size: 3.5rem;"></i></div>
    <h4 class="text-dark fw-medium mb-2">Check your email</h4>
    <p class="text-muted small mb-4">If an account with that email exists, we've sent a password reset link.</p>
    
    <a href="{% url 'accounts:login' %}" class="btn btn-primary-custom w-100"><i class="bi bi-arrow-left me-1"></i>Back to login</a>
</div>
{% endblock %}
