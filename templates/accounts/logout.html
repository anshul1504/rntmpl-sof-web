{% extends "accounts/auth_base.html" %}
{% load static %}

{% block title %}Sign Out - RNT MPL{% endblock %}

{% block auth_content %}
<div class="mb-4 text-center">
    <div class="mb-3 d-inline-flex align-items-center justify-content-center bg-light rounded-circle" style="width: 72px; height: 72px; border: 2px solid rgba(212, 175, 55, 0.2);">
        <i class="bi bi-box-arrow-right text-primary-custom" style="font-size: 2rem; color: var(--gold-primary);"></i>
    </div>
    <h4 class="text-dark fw-medium mb-1">Confirm Sign Out</h4>
    <p class="text-muted small">Are you sure you want to log out of your RNT MPL account?</p>
</div>

<form method="post" action="{% url 'accounts:logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-primary-custom w-100 btn-lg mb-3">Yes, Sign Out</button>
    <a href="{% url 'accounts:dashboard' %}" class="btn btn-outline-custom w-100">Cancel</a>
</form>
{% endblock %}
