# Enterprise Cricket Ecosystem - Nginx Site Config

upstream web {
    server web:8000;
}

upstream asgi {
    server asgi:8001;
}

server {
    listen 80;
    server_name localhost cricketecosystem.local;

    client_max_body_size 50M;

    # Static files
    location /static/ {
        alias /var/www/cricket/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (private by default; signed URLs in production)
    location /media/ {
        alias /var/www/cricket/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # WebSocket connections for live scoring
    location /ws/ {
        proxy_pass http://asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API and application
    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
